name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with: { node-version: "18.x" }
      - name: Install Backend
        run: cd backend && npm ci
      - name: Install Frontend & Build
        run: cd frontend && npm ci && npm run build
