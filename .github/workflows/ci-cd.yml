name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install Backend
        run: |
          cd backend
          npm ci

      - name: Install Frontend & Build
        run: |
          cd frontend
          npm ci
          npm run build
